name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache SFML build (_deps)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-sfml-3.1.0-v1

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "build/GameCpp.exe" "release/"
          Copy-Item "C:/Windows/Fonts/arial.ttf" "release/"
          Get-ChildItem "build" -Filter "*.dll" |
              ForEach-Object { Copy-Item $_.FullName "release/" -Force }
          Write-Host "=== Release contents ==="
          Get-ChildItem "release"
          Compress-Archive -Path "release/*" -DestinationPath "GameCpp-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameCpp-windows
          path: GameCpp-windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: GameCpp-windows.zip
          body: |
            ## Скачать и запустить

            1. Скачай **GameCpp-windows.zip**
            2. Распакуй в любую папку
            3. Запусти **GameCpp.exe**

            Никаких установок не требуется — все DLL и шрифты уже внутри архива.

            ## Управление
            | Клавиша | Действие |
            |---------|----------|
            | WASD | Передвижение |
            | Space | Отдых / Хил за ману |
            | ЛКМ на сундук | Открыть сундук |
            | R | Перезапустить |
