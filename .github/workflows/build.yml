name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download SFML 3.1.0 (prebuilt, vc17 x64)
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://www.sfml-dev.org/files/SFML-3.1.0-windows-vc17-64-bit.zip" `
            -OutFile "SFML.zip"
          Expand-Archive "SFML.zip" -DestinationPath "C:/"

      - name: Configure CMake
        shell: powershell
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DSFML_DIR="C:/SFML-3.1.0-windows-vc17-64-bit/lib/cmake/SFML"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "build/Release/GameCpp.exe" "release/"
          Copy-Item "C:/Windows/Fonts/arial.ttf" "release/"
          Get-ChildItem "build/Release" -Filter "*.dll" |
              ForEach-Object { Copy-Item $_.FullName "release/" }
          Compress-Archive -Path "release/*" -DestinationPath "GameCpp-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameCpp-windows
          path: GameCpp-windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: GameCpp-windows.zip
          body: |
            ## Скачать и запустить

            1. Скачай **GameCpp-windows.zip**
            2. Распакуй в любую папку
            3. Запусти **GameCpp.exe**

            Никаких установок не требуется — все DLL и шрифты уже внутри архива.

            ## Управление
            | Клавиша | Действие |
            |---------|----------|
            | WASD | Передвижение |
            | Space | Отдых / Хил за ману |
            | ЛКМ на сундук | Открыть сундук |
            | R | Перезапустить |
