name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download SFML 3.1.0
        shell: powershell
        run: |
          Write-Host "Downloading SFML..."
          Invoke-WebRequest `
            -Uri "https://www.sfml-dev.org/files/SFML-3.1.0-windows-vc17-64-bit.zip" `
            -OutFile "SFML.zip" `
            -UseBasicParsing
          Write-Host "Extracting..."
          Expand-Archive "SFML.zip" -DestinationPath "C:/SFML-pkg" -Force
          Write-Host "Contents of C:/SFML-pkg:"
          Get-ChildItem "C:/SFML-pkg" -Recurse -Depth 3

      - name: Locate SFML cmake dir
        shell: powershell
        run: |
          $cmake = Get-ChildItem -Path "C:/SFML-pkg" -Recurse -Filter "SFMLConfig.cmake" |
                   Select-Object -First 1
          if (-not $cmake) { Write-Error "SFMLConfig.cmake not found!"; exit 1 }
          $dir = $cmake.Directory.FullName
          Write-Host "SFML cmake dir: $dir"
          echo "SFML_CMAKE_DIR=$dir" >> $env:GITHUB_ENV

      - name: Configure CMake
        shell: powershell
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DSFML_DIR="${env:SFML_CMAKE_DIR}"

      - name: Build
        shell: powershell
        run: cmake --build build

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "build/GameCpp.exe" "release/"
          Copy-Item "C:/Windows/Fonts/arial.ttf" "release/"
          # DLLs copied by CMake POST_BUILD — grab everything from build/
          Get-ChildItem "build" -Filter "*.dll" |
              ForEach-Object { Copy-Item $_.FullName "release/" }
          # Also grab SFML DLLs directly from the package in case POST_BUILD missed any
          $sfmlBin = Split-Path $env:SFML_CMAKE_DIR -Parent | Split-Path -Parent | Join-Path -ChildPath "bin"
          if (Test-Path $sfmlBin) {
              Get-ChildItem "$sfmlBin" -Filter "*-3.dll" |
                  ForEach-Object { Copy-Item $_.FullName "release/" -Force }
          }
          Write-Host "Release folder contents:"
          Get-ChildItem release
          Compress-Archive -Path "release/*" -DestinationPath "GameCpp-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameCpp-windows
          path: GameCpp-windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: GameCpp-windows.zip
          body: |
            ## Скачать и запустить

            1. Скачай **GameCpp-windows.zip**
            2. Распакуй в любую папку
            3. Запусти **GameCpp.exe**

            Никаких установок не требуется — все DLL и шрифты уже внутри архива.

            ## Управление
            | Клавиша | Действие |
            |---------|----------|
            | WASD | Передвижение |
            | Space | Отдых / Хил за ману |
            | ЛКМ на сундук | Открыть сундук |
            | R | Перезапустить |
