name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  VCPKG_ROOT: C:/vcpkg

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT --depth=1
          & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

      # Binary cache: stores pre-compiled vcpkg packages across runs
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: C:/Users/runneradmin/AppData/Local/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-sfml3-v1
          restore-keys: ${{ runner.os }}-vcpkg-sfml3-

      - name: Install SFML via vcpkg (classic mode, no manifest)
        shell: powershell
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" install sfml:x64-windows --no-print-usage

      - name: Configure CMake
        shell: powershell
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_MANIFEST_MODE=OFF

      - name: Build
        shell: powershell
        run: cmake --build build

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "build/GameCpp.exe" "release/"
          Copy-Item "C:/Windows/Fonts/arial.ttf" "release/"
          # DLLs copied by CMake POST_BUILD into build/
          Get-ChildItem "build" -Filter "*.dll" |
              ForEach-Object { Copy-Item $_.FullName "release/" -Force }
          # Safety: also grab vcpkg DLLs in case POST_BUILD missed any
          Get-ChildItem "$env:VCPKG_ROOT/installed/x64-windows/bin" -Filter "*.dll" -ErrorAction SilentlyContinue |
              ForEach-Object { Copy-Item $_.FullName "release/" -Force }
          Write-Host "=== Release contents ==="
          Get-ChildItem "release"
          Compress-Archive -Path "release/*" -DestinationPath "GameCpp-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameCpp-windows
          path: GameCpp-windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: GameCpp-windows.zip
          body: |
            ## Скачать и запустить

            1. Скачай **GameCpp-windows.zip**
            2. Распакуй в любую папку
            3. Запусти **GameCpp.exe**

            Никаких установок не требуется — все DLL и шрифты уже внутри архива.

            ## Управление
            | Клавиша | Действие |
            |---------|----------|
            | WASD | Передвижение |
            | Space | Отдых / Хил за ману |
            | ЛКМ на сундук | Открыть сундук |
            | R | Перезапустить |
